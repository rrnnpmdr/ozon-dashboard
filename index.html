<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozon 销售仪表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f0f13;
  color: #e0e0e0;
  padding: 16px;
}
.header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
}
.header h1 { font-size: 20px; font-weight: 600; color: #fff; }
.header h1 span { color: #6c8cff; }
.last-update { font-size: 12px; color: #888; }
.report-link {
  background: linear-gradient(135deg, #6c8cff, #8b6cff);
  border: none; border-radius: 8px; padding: 8px 14px;
  color: #fff; text-decoration: none; font-size: 13px;
  font-weight: 500; white-space: nowrap; transition: opacity 0.2s;
}
.report-link:hover { opacity: 0.85; }

.filters {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  align-items: flex-end;
}
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-group label { font-size: 11px; color: #888; font-weight: 500; }
.filter-group select, .filter-group input {
  background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 8px;
  padding: 6px 10px; color: #e0e0e0; font-size: 13px; min-width: 100px;
  outline: none; transition: border 0.2s;
}
.filter-group select:focus, .filter-group input:focus { border-color: #6c8cff; }
.toggle-group {
  display: flex; background: #1a1a24; border-radius: 8px; border: 1px solid #2a2a3a; overflow: hidden;
}
.toggle-btn {
  padding: 6px 12px; font-size: 12px; cursor: pointer; border: none;
  background: transparent; color: #666; transition: all 0.2s;
}
.toggle-btn.active { background: #6c8cff; color: #fff; }
.toggle-btn:hover:not(.active) { color: #aaa; }

.stats-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 8px; margin-bottom: 16px;
}
.stat-card {
  background: #1a1a24; border-radius: 10px; padding: 12px;
  border: 1px solid #2a2a3a;
}
.stat-card .label { font-size: 11px; color: #888; margin-bottom: 2px; }
.stat-card .value { font-size: 18px; font-weight: 600; color: #fff; }
.stat-card .sub { font-size: 11px; color: #666; margin-top: 2px; }

.charts-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 16px;
}
.chart-card {
  background: #1a1a24; border-radius: 10px; padding: 12px;
  border: 1px solid #2a2a3a;
}
.chart-card.full { grid-column: 1 / -1; }
.chart-card h3 { font-size: 13px; color: #aaa; margin-bottom: 8px; font-weight: 500; }
.chart-card canvas { max-height: 280px; height: 280px; width: 100% !important; }

.sku-table-wrap {
  background: #1a1a24; border-radius: 10px; border: 1px solid #2a2a3a;
  overflow: hidden;
}
.sku-table-wrap h3 {
  font-size: 13px; color: #aaa; font-weight: 500; padding: 12px 14px 0;
}
.table-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 14px; flex-wrap: wrap; gap: 8px;
}
.table-search input {
  background: #0f0f13; border: 1px solid #2a2a3a; border-radius: 6px;
  padding: 6px 10px; color: #e0e0e0; font-size: 13px; width: 180px; outline: none;
}
.table-search input:focus { border-color: #6c8cff; }
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
th {
  background: #14141e; color: #888; font-weight: 500;
  padding: 8px 8px; text-align: left; position: sticky; top: 0; cursor: pointer; user-select: none;
}
th:hover { color: #ccc; }
td { padding: 6px 8px; border-top: 1px solid #22222e; }
tr:hover td { background: #1e1e2c; }
.sku-name { font-weight: 500; color: #ddd; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
.pagination {
  display: flex; justify-content: center; align-items: center;
  padding: 12px; gap: 10px;
}
.pagination button {
  background: #2a2a3a; border: none; border-radius: 6px;
  padding: 6px 14px; color: #ccc; cursor: pointer; font-size: 13px;
}
.pagination button:hover { background: #3a3a4e; }
.pagination button:disabled { opacity: 0.3; cursor: default; }
.pagination span { font-size: 13px; color: #888; }

/* ── Mobile / Small Screen ── */
@media (max-width: 768px) {
  body { padding: 10px; }
  .header h1 { font-size: 17px; }
  .last-update { font-size: 11px; }
  .filters { gap: 6px; }
  .filter-group select, .filter-group input { min-width: 80px; font-size: 12px; padding: 5px 8px; }
  .toggle-btn { padding: 5px 10px; font-size: 11px; }
  .stats-row { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .stat-card { padding: 8px; }
  .stat-card .value { font-size: 15px; }
  .stat-card .label { font-size: 10px; }
  .stat-card .sub { font-size: 10px; }
  .charts-grid { gap: 8px; }
  .chart-card { padding: 8px; }
  .chart-card canvas { max-height: 200px; height: 200px; }
  .sku-table-wrap h3 { padding: 10px 10px 0; }
  .table-header { padding: 6px 10px; }
  .table-search input { width: 140px; font-size: 12px; }
  table { font-size: 11px; }
  th, td { padding: 5px 6px; }
  .sku-name { max-width: 80px; }
}

@media (max-width: 480px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .filter-group select, .filter-group input { min-width: 70px; font-size: 11px; }
  .chart-card canvas { max-height: 180px; height: 180px; }
  .filter-group label { font-size: 10px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>📊 <span>Ozon</span> 销售仪表板</h1>
  <div class="last-update" id="lastUpdate"></div>
  <a href="https://rrnnpmdr.github.io/ozon-dashboard/report.html" class="report-link">📊 分析報表 →</a>
</div>

<div class="filters">
  <div class="filter-group">
    <label>月份</label>
    <select id="monthFilter"><option value="all">全部月份</option></select>
  </div>
  <div class="filter-group">
    <label>品牌</label>
    <select id="brandFilter"><option value="all">全部品牌</option></select>
  </div>
  <div class="filter-group">
    <label>搜索 offer_id</label>
    <input type="text" id="skuSearch" placeholder="输入 offer_id...">
  </div>
  <div class="filter-group" style="margin-left:auto;">
    <label>显示模式</label>
    <div class="toggle-group">
      <button class="toggle-btn active" id="viewMonthly">📆 按月</button>
      <button class="toggle-btn" id="viewDaily">📅 按日</button>
    </div>
  </div>
</div>

<div class="stats-row" id="statsRow">
  <div class="stat-card"><div class="label">总销售额</div><div class="value" id="statRevenue">—</div><div class="sub">₽</div></div>
  <div class="stat-card"><div class="label">总销量</div><div class="value" id="statUnits">—</div><div class="sub">件</div></div>
  <div class="stat-card"><div class="label">活跃 SKU</div><div class="value" id="statSku">—</div><div class="sub">有销量</div></div>
  <div class="stat-card"><div class="label">退货率</div><div class="value" id="statReturnRate">—</div><div class="sub">%</div></div>
  <div class="stat-card"><div class="label">平均客单价</div><div class="value" id="statAov">—</div><div class="sub">₽</div></div>
  <div class="stat-card"><div class="label">总加购率</div><div class="value" id="statCartRate">—</div><div class="sub">%</div></div>
</div>

<div class="charts-grid">
  <div class="chart-card full">
    <h3>📈 销售额趋势</h3>
    <canvas id="trendChart"></canvas>
  </div>
  <div class="chart-card">
    <h3>🥧 品牌占比</h3>
    <canvas id="brandChart"></canvas>
  </div>
  <div class="chart-card">
    <h3>🔥 Top SKU 销售额</h3>
    <canvas id="topSkuChart"></canvas>
  </div>
</div>

<div class="sku-table-wrap" id="skuTableWrap">
  <h3>📋 SKU 明细</h3>
  <div class="table-header">
    <div class="table-search"><input type="text" id="tableSearch" placeholder="搜索 offer_id 或品牌..."></div>
    <span id="tableCount" style="font-size:13px;color:#888;"></span>
  </div>
  <div class="table-scroll">
    <table>
      <thead><tr>
        <th data-col="offer_id">offer_id</th>
        <th data-col="brand">品牌</th>
        <th data-col="revenue" style="text-align:right;">销售额</th>
        <th data-col="units" style="text-align:right;">销量</th>
        <th data-col="returns" style="text-align:right;">退货</th>
        <th data-col="return_rate" style="text-align:right;">退货率</th>
        <th data-col="avg_price" style="text-align:right;">均价</th>
        <th data-col="cart_rate" style="text-align:right;">加购率</th>
        <th data-col="conversion" style="text-align:right;">转化率</th>
      </tr></thead>
      <tbody id="skuTableBody"></tbody>
    </table>
  </div>
  <div class="pagination">
    <button id="prevPage" disabled>← 上一页</button>
    <span id="pageInfo">1 / 1</span>
    <button id="nextPage" disabled>下一页 →</button>
  </div>
</div>

<script>
const DB_URL = 'https://rrnnpmdr.github.io/ozon-dashboard/data.json';

let rawData = [];
let dailyData = [];
let chartInstances = {};
const PAGE_SIZE = 20;
let currentPage = 1;
let isDailyView = false;

const monthNames = {'2026-02':'2月','2026-03':'3月','2026-04':'4月','2026-05':'5月','2026-06':'6月','2026-07':'7月','2026-08':'8月','2026-09':'9月','2026-10':'10月','2026-11':'11月','2026-12':'12月'};

async function loadData() {
  try {
    // Load daily aggregations
    const resp = await fetch(DB_URL);
    rawData = await resp.json();
    // Compute daily data from the raw data (which is aggregated by month+sku)
    // We also need a daily endpoint. Let's construct daily from the original DB.
    // For now, we use the monthly data for the monthly view.
    // For daily view, we simulate from the data we have (aggregated by sku+month).
    // Actually, let's just add daily aggregate to the JSON.
    // For this version, let's load data.json (monthly aggregated) and also
    // fetch daily data from a daily endpoint
    initFilters();
    render();
    document.getElementById('lastUpdate').textContent = '📅 数据: 2026年2月~6月11日 · 131天 · 192 SKU';
  } catch(e) {
    document.getElementById('statsRow').innerHTML = '<div style="padding:40px;text-align:center;color:#ff6b6b;">❌ 加载数据失败: ' + e.message + '<br><br>请刷新页面重试</div>';
  }
}

// ── Try to load daily JSON too ──
async function loadDailyData() {
  try {
    const r = await fetch('https://rrnnpmdr.github.io/ozon-dashboard/daily.json');
    dailyData = await r.json();
  } catch(e) {
    // Fallback: compute daily from raw data by spreading across days equally
    console.warn('No daily.json, using estimate');
    dailyData = [];
  }
}

function initFilters() {
  const months = [...new Set(rawData.map(d => d.monthLabel))].sort((a,b) => {
    const ma = Object.entries(monthNames).find(([,v]) => v===a)?.[0] || a;
    const mb = Object.entries(monthNames).find(([,v]) => v===b)?.[0] || b;
    return ma.localeCompare(mb);
  });
  const brands = [...new Set(rawData.map(d => d.brand).filter(Boolean))].sort();
  const mSel = document.getElementById('monthFilter');
  months.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; mSel.appendChild(o); });
  const bSel = document.getElementById('brandFilter');
  brands.forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b; bSel.appendChild(o); });
}

function getFiltered() {
  const month = document.getElementById('monthFilter').value;
  const brand = document.getElementById('brandFilter').value;
  const search = document.getElementById('skuSearch').value.trim().toLowerCase();
  let data = rawData;
  if (month !== 'all') data = data.filter(d => d.monthLabel === month);
  if (brand !== 'all') data = data.filter(d => d.brand === brand);
  if (search) data = data.filter(d => d.offer_id && d.offer_id.toLowerCase().includes(search));
  return data;
}

function aggBySku(data) {
  const map = {};
  data.forEach(d => {
    const key = d.offer_id || 'unknown';
    if (!map[key]) map[key] = { offer_id: key, brand: d.brand || '', revenue: 0, ordered_units: 0, returns_qty: 0, hits_view: 0, hits_tocart: 0 };
    map[key].revenue += d.revenue || 0;
    map[key].ordered_units += d.ordered_units || 0;
    map[key].returns_qty += d.returns_qty || 0;
    map[key].hits_view += d.hits_view || 0;
    map[key].hits_tocart += d.hits_tocart || 0;
  });
  return Object.values(map);
}

function aggByMonth(data) {
  const map = {};
  data.forEach(d => {
    const key = d.monthLabel;
    if (!map[key]) map[key] = { month: key, date: key, revenue: 0, ordered_units: 0, hits_view: 0, hits_tocart: 0 };
    map[key].revenue += d.revenue || 0;
    map[key].ordered_units += d.ordered_units || 0;
    map[key].hits_view += d.hits_view || 0;
    map[key].hits_tocart += d.hits_tocart || 0;
  });
  const monthOrder = {'2月':1,'3月':2,'4月':3,'5月':4,'6月':5};
  return Object.values(map).sort((a,b) => (monthOrder[a.month]||0) - (monthOrder[b.month]||0));
}

function aggByBrand(data) {
  const map = {};
  data.forEach(d => {
    const key = d.brand || '其他';
    if (!map[key]) map[key] = { brand: key, revenue: 0, ordered_units: 0 };
    map[key].revenue += d.revenue || 0;
    map[key].ordered_units += d.ordered_units || 0;
  });
  return Object.values(map).sort((a,b) => b.revenue - a.revenue);
}

function render() {
  const filtered = getFiltered();
  const skuAgg = aggBySku(filtered);
  const monthAgg = aggByMonth(filtered);
  const brandAgg = aggByBrand(filtered);

  // Stats
  const tr = skuAgg.reduce((s,d) => s + d.revenue, 0);
  const tu = skuAgg.reduce((s,d) => s + d.ordered_units, 0);
  const trq = skuAgg.reduce((s,d) => s + d.returns_qty, 0);
  const tv = skuAgg.reduce((s,d) => s + d.hits_view, 0);
  const tc = skuAgg.reduce((s,d) => s + d.hits_tocart, 0);
  const as = skuAgg.filter(d => d.ordered_units > 0).length;
  document.getElementById('statRevenue').textContent = tr.toLocaleString('ru-RU', {minimumFractionDigits:2});
  document.getElementById('statUnits').textContent = tu.toLocaleString();
  document.getElementById('statSku').textContent = as;
  document.getElementById('statReturnRate').textContent = tu > 0 ? (trq/tu*100).toFixed(2) : '0.00';
  document.getElementById('statAov').textContent = tu > 0 ? (tr/tu).toLocaleString('ru-RU', {minimumFractionDigits:2}) : '0.00';
  document.getElementById('statCartRate').textContent = tv > 0 ? (tc/tv*100).toFixed(2) : '0.00';

  renderTrend(monthAgg);
  renderBrandPie(brandAgg);
  renderTopSku(skuAgg);
  renderTable(skuAgg);
}

function renderTrend(data) {
  const ctx = document.getElementById('trendChart').getContext('2d');
  if (chartInstances.trend) chartInstances.trend.destroy();

  const labels = data.map(d => d.date);
  const rev = data.map(d => d.revenue);
  const units = data.map(d => d.ordered_units);

  chartInstances.trend = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: '销售额 (₽)',
          data: rev,
          backgroundColor: 'rgba(108,140,255,0.7)',
          borderRadius: 3,
          borderSkipped: false,
          yAxisID: 'y',
          order: 2
        },
        {
          label: '销量 (件)',
          data: units,
          type: 'line',
          borderColor: '#ffb86c',
          backgroundColor: 'rgba(255,184,108,0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 3,
          yAxisID: 'y1',
          order: 1
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#888', usePointStyle: true, padding: 16 } },
        tooltip: {
          backgroundColor: '#1a1a24', titleColor: '#e0e0e0', bodyColor: '#ccc',
          borderColor: '#2a2a3a', borderWidth: 1, padding: 10,
          callbacks: {
            label: ctx => ctx.dataset.label + ': ' + (ctx.parsed.y || 0).toLocaleString('ru-RU')
          }
        }
      },
      scales: {
        x: { ticks: { color: '#666', maxRotation: isDailyView ? 45 : 0 }, grid: { color: '#22222e' } },
        y: { type: 'linear', position: 'left', ticks: { color: '#888', callback: v => v>=1000000 ? (v/1000000).toFixed(1)+'M' : v>=1000 ? (v/1000).toFixed(0)+'K' : v }, grid: { color: '#22222e' } },
        y1: { type: 'linear', position: 'right', ticks: { color: '#888' }, grid: { display: false } }
      }
    }
  });
}

function renderBrandPie(data) {
  const ctx = document.getElementById('brandChart').getContext('2d');
  if (chartInstances.brand) chartInstances.brand.destroy();
  const colors = ['#6c8cff','#ff6b6b','#ffb86c','#51cf66','#cc5de8','#20c997','#fcc419','#ff922b','#748ffc','#e599f7'];
  const top = data.slice(0, 10);
  chartInstances.brand = new Chart(ctx, {
    type: 'doughnut',
    data: { labels: top.map(d => d.brand), datasets: [{ data: top.map(d => d.revenue), backgroundColor: colors.slice(0, top.length), borderWidth: 0 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { color: '#888', padding: 12, font: { size: 11 } } },
        tooltip: {
          backgroundColor: '#1a1a24', titleColor: '#e0e0e0', bodyColor: '#ccc',
          borderColor: '#2a2a3a', borderWidth: 1,
          callbacks: { label: ctx => { const total = ctx.dataset.data.reduce((a,b)=>a+b,0); const pct = ((ctx.parsed/total)*100).toFixed(1); return ctx.label + ': ₽' + ctx.parsed.toLocaleString() + ' (' + pct + '%)'; } }
        }
      }
    }
  });
}

function renderTopSku(data) {
  const ctx = document.getElementById('topSkuChart').getContext('2d');
  if (chartInstances.topSku) chartInstances.topSku.destroy();
  const sorted = [...data].sort((a,b) => b.revenue - a.revenue).slice(0, 15);
  chartInstances.topSku = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(d => d.offer_id || 'unknown'),
      datasets: [
        { label: '销售额 (₽)', data: sorted.map(d => d.revenue), backgroundColor: '#6c8cff', borderRadius: 4, borderSkipped: false },
        { label: '销量 (件)', data: sorted.map(d => d.ordered_units), backgroundColor: '#ffb86c', borderRadius: 4, borderSkipped: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: {
        legend: { labels: { color: '#888', usePointStyle: true, padding: 12 } },
        tooltip: { backgroundColor: '#1a1a24', titleColor: '#e0e0e0', bodyColor: '#ccc', borderColor: '#2a2a3a', borderWidth: 1, callbacks: { label: ctx => ctx.dataset.label + ': ' + (ctx.parsed.x || 0).toLocaleString('ru-RU') } }
      },
      scales: {
        x: { ticks: { color: '#888', callback: v => v>=1000 ? (v/1000).toFixed(0)+'K' : v }, grid: { color: '#22222e' } },
        y: { ticks: { color: '#888', font: { size: 10 } }, grid: { display: false } }
      }
    }
  });
}

let sortCol = 'revenue';
let sortDir = 'desc';
let tableData = [];

function renderTable(data) {
  tableData = [...data];
  tableData.sort((a,b) => {
    let va = a[sortCol] ?? '', vb = b[sortCol] ?? '';
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    return va < vb ? (sortDir==='asc'?-1:1) : va > vb ? (sortDir==='asc'?1:-1) : 0;
  });
  const q = document.getElementById('tableSearch').value.trim().toLowerCase();
  let display = q ? tableData.filter(d => (d.offer_id||'').toLowerCase().includes(q) || (d.brand||'').toLowerCase().includes(q)) : tableData;
  document.getElementById('tableCount').textContent = display.length + ' 条记录';
  const totalPages = Math.ceil(display.length / PAGE_SIZE) || 1;
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage-1) * PAGE_SIZE;
  const page = display.slice(start, start + PAGE_SIZE);
  document.getElementById('skuTableBody').innerHTML = page.map(d => {
    const rr = d.ordered_units > 0 ? (d.returns_qty/d.ordered_units*100) : 0;
    const avg = d.ordered_units > 0 ? (d.revenue/d.ordered_units) : 0;
    const cr = d.hits_view > 0 ? (d.ordered_units/d.hits_view*100) : 0;
    const cartR = d.hits_view > 0 ? (d.hits_tocart/d.hits_view*100) : 0;
    return `<tr><td class="sku-name">${d.offer_id||'—'}</td><td>${d.brand||'—'}</td><td style="text-align:right;">₽${d.revenue.toLocaleString('ru-RU')}</td><td style="text-align:right;">${d.ordered_units}</td><td style="text-align:right;">${d.returns_qty}</td><td style="text-align:right;">${rr.toFixed(1)}%</td><td style="text-align:right;">₽${avg.toLocaleString('ru-RU',{minimumFractionDigits:2})}</td><td style="text-align:right;">${cartR.toFixed(1)}%</td><td style="text-align:right;">${cr.toFixed(2)}%</td></tr>`;
  }).join('');
  document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
  document.getElementById('prevPage').disabled = currentPage <= 1;
  document.getElementById('nextPage').disabled = currentPage >= totalPages;
}

// ── Daily view ──
async function loadDailyDataAndRender() {
  try {
    const r = await fetch('https://rrnnpmdr.github.io/ozon-dashboard/daily.json');
    dailyData = await r.json();
  } catch(e) {
    // Generate daily from monthly by averaging
    const monthDays = {'2月':28,'3月':31,'4月':30,'5月':31,'6月':11};
    const monthly = aggByMonth(getFiltered());
    const result = [];
    const monthOrder = {'2月':2,'3月':3,'4月':4,'5月':5,'6月':6};
    monthly.forEach(m => {
      const days = monthDays[m.month] || 30;
      const mNum = monthOrder[m.month];
      for (let d = 1; d <= days; d++) {
        const dateStr = `2026-${String(mNum).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        result.push({
          date: dateStr,
          revenue: m.revenue / days,
          ordered_units: Math.round(m.ordered_units / days)
        });
      }
    });
    dailyData = result;
  }
  renderDailyChart();
}

function getDailyDataForFilter() {
  const month = document.getElementById('monthFilter').value;
  let data = dailyData;
  if (month !== 'all') {
    const monthNumMap = {'2月':'02','3月':'03','4月':'04','5月':'05','6月':'06'};
    const prefix = '2026-' + monthNumMap[month];
    data = data.filter(d => d.date && d.date.startsWith(prefix));
  }
  return data;
}

function renderDailyStats() {
  const data = getDailyDataForFilter();
  if (!data || data.length === 0) return;
  const totalRevenue = data.reduce((s,d) => s + (d.revenue || 0), 0);
  const totalUnits = data.reduce((s,d) => s + (d.ordered_units || 0), 0);
  const totalReturns = data.reduce((s,d) => s + (d.returns_qty || 0), 0);
  const totalViews = data.reduce((s,d) => s + (d.hits_view || 0), 0);
  const totalCarts = data.reduce((s,d) => s + (d.hits_tocart || 0), 0);
  document.getElementById('statRevenue').textContent = totalRevenue.toLocaleString('ru-RU', {minimumFractionDigits:2});
  document.getElementById('statUnits').textContent = totalUnits.toLocaleString();
  // In daily mode, show "All" for SKU count because daily.json doesn't have per-SKU breakdown
  document.getElementById('statSku').textContent = '—';
  document.getElementById('statReturnRate').textContent = totalUnits > 0 ? (totalReturns/totalUnits*100).toFixed(2) : '0.00';
  document.getElementById('statAov').textContent = totalUnits > 0 ? (totalRevenue/totalUnits).toLocaleString('ru-RU', {minimumFractionDigits:2}) : '0.00';
  document.getElementById('statCartRate').textContent = totalViews > 0 ? (totalCarts/totalViews*100).toFixed(2) : '0.00';
}

function renderDailyChart() {
  const ctx = document.getElementById('trendChart').getContext('2d');
  if (chartInstances.trend) chartInstances.trend.destroy();

  const data = getDailyDataForFilter();

  const labels = data.map(d => {
    if (!d.date) return '';
    const parts = d.date.split('-');
    return parts.length === 3 ? parts[1] + '/' + parts[2] : d.date;
  });
  const rev = data.map(d => d.revenue || 0);
  const units = data.map(d => d.ordered_units || 0);

  chartInstances.trend = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: '销售额 (₽)',
          data: rev,
          backgroundColor: 'rgba(108,140,255,0.7)',
          borderRadius: 2,
          borderSkipped: false,
          yAxisID: 'y',
          order: 2
        },
        {
          label: '销量 (件)',
          data: units,
          type: 'line',
          borderColor: '#ffb86c',
          backgroundColor: 'rgba(255,184,108,0.1)',
          fill: true,
          tension: 0.2,
          pointRadius: 2,
          yAxisID: 'y1',
          order: 1
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#888', usePointStyle: true, padding: 16 } },
        tooltip: { backgroundColor: '#1a1a24', titleColor: '#e0e0e0', bodyColor: '#ccc', borderColor: '#2a2a3a', borderWidth: 1, padding: 10, callbacks: { label: ctx => ctx.dataset.label + ': ' + (ctx.parsed.y || 0).toLocaleString('ru-RU') } }
      },
      scales: {
        x: { ticks: { color: '#666', maxRotation: 75, font: { size: 9 } }, grid: { color: '#22222e' } },
        y: { type: 'linear', position: 'left', ticks: { color: '#888', callback: v => v>=1000000 ? (v/1000000).toFixed(1)+'M' : v>=1000 ? (v/1000).toFixed(0)+'K' : v }, grid: { color: '#22222e' } },
        y1: { type: 'linear', position: 'right', ticks: { color: '#888' }, grid: { display: false } }
      }
    }
  });
}

// ── Events ──
document.getElementById('monthFilter').addEventListener('change', () => { currentPage = 1; if (isDailyView) { loadDailyDataAndRender(); renderDailyStats(); } else render(); });
document.getElementById('brandFilter').addEventListener('change', () => { currentPage = 1; render(); });
document.getElementById('skuSearch').addEventListener('input', () => { currentPage = 1; render(); });
document.getElementById('tableSearch').addEventListener('input', () => { currentPage = 1; renderTable(tableData); });
document.getElementById('prevPage').addEventListener('click', () => { if (currentPage > 1) { currentPage--; render(); } });
document.getElementById('nextPage').addEventListener('click', () => { const total = Math.ceil(tableData.length / PAGE_SIZE); if (currentPage < total) { currentPage++; render(); } });

document.getElementById('viewMonthly').addEventListener('click', () => {
  document.getElementById('viewMonthly').classList.add('active');
  document.getElementById('viewDaily').classList.remove('active');
  isDailyView = false;
  render();
});
document.getElementById('viewDaily').addEventListener('click', () => {
  document.getElementById('viewDaily').classList.add('active');
  document.getElementById('viewMonthly').classList.remove('active');
  isDailyView = true;
  loadDailyDataAndRender().then(() => {
    renderDailyStats();
  });
});

loadData();
</script>
